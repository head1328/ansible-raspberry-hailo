---

argument_specs:
  main:
    short_description: "Main entrypoint for the hailo role"
    author: Kevin Horst <info@kevinhorst.de>
    options:
      hailo_variant:
        type: str
        required: false
        default: h10
        choices:
          - h8l
          - h8
          - h10
        description:
          - The Hailo device variant to install drivers for.
          - "h8l: Hailo-8L (AI HAT+ 13 TOPS)"
          - "h8: Hailo-8 (AI HAT+ 26 TOPS)"
          - "h10: Hailo-10H (AI HAT+ 2, up to 40 TOPS)"

      hailo_source:
        type: str
        required: false
        default: raspberry
        choices:
          - raspberry
          - vendor
        description:
          - Installation source for Hailo packages.
          - "raspberry: Raspberry Pi apt repository"
          - "vendor: Hailo directly (dev-public.hailo.ai)"

      hailo_vendor_version:
        type: str
        required: false
        default: "5.3.0"
        description:
          - Version of Hailo vendor packages.
          - Only used when hailo_source is vendor.

      hailo_vendor_base_url:
        type: str
        required: false
        default: "https://dev-public.hailo.ai/2026_04/Hailo10"
        description:
          - Base URL for Hailo vendor package downloads.
          - Only used when hailo_source is vendor.
